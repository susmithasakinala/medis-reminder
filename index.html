<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Guardian - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .button-group {
            margin-top: 35px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #27ae60;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-wrapper {
            display: none;
        }

        .form-wrapper.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 10px;
        }

        .step {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #667eea;
        }

        .step.completed {
            background: #27ae60;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🩺</div>
            <h1>Health Guardian</h1>
            <p class="subtitle">Smart Medication Management System</p>
        </div>

        <form id="registrationForm">
            <div class="step-indicator">
                <div class="step active" id="step-indicator-1"></div>
                <div class="step" id="step-indicator-2"></div>
                <div class="step" id="step-indicator-3"></div>
            </div>

            <!-- Step 1: Name & Age -->
            <div class="form-wrapper active" id="form-1">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Enter your full name"
                        required
                    >
                    <div class="error" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input 
                        type="number" 
                        id="age" 
                        name="age" 
                        placeholder="Enter your age"
                        min="1"
                        max="150"
                        required
                    >
                    <div class="help-text">Please enter your actual age for better recommendations</div>
                    <div class="error" id="ageError"></div>
                </div>

                <button type="button" class="btn-submit" onclick="nextStep(1)">Continue</button>
            </div>

            <!-- Step 2: Language & Gender -->
            <div class="form-wrapper" id="form-2">
                <div class="form-group">
                    <label for="language">Preferred Language</label>
                    <select id="language" name="language" required>
                        <option value="">Select your preferred language</option>
                        <option value="english">English</option>
                        <option value="spanish">Spanish (Español)</option>
                        <option value="french">French (Français)</option>
                        <option value="german">German (Deutsch)</option>
                        <option value="hindi">Hindi (हिंदी)</option>
                        <option value="gujarati">Gujarati (ગુજરાતી)</option>
                        <option value="marathi">Marathi (मराठी)</option>
                        <option value="tamil">Tamil (தமிழ்)</option>
                        <option value="telugu">Telugu (తెలుగు)</option>
                        <option value="chinese">Chinese Simplified (简体中文)</option>
                        <option value="japanese">Japanese (日本語)</option>
                    </select>
                    <div class="error" id="languageError"></div>
                </div>

                <div class="form-group">
                    <label for="gender">Gender (Optional)</label>
                    <select id="gender" name="gender">
                        <option value="">Select or skip</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                        <option value="prefer-not">Prefer not to say</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-submit" style="background: #95a5a6; flex: 1;" onclick="previousStep(2)">Back</button>
                    <button type="button" class="btn-submit" style="flex: 1;" onclick="nextStep(2)">Continue</button>
                </div>
            </div>

            <!-- Step 3: Voice Preference -->
            <div class="form-wrapper" id="form-3">
                <div class="form-group">
                    <label for="voiceGender">Preferred Voice for Reminders</label>
                    <select id="voiceGender" name="voiceGender" required>
                        <option value="">Select voice preference</option>
                        <option value="male">Male Voice</option>
                        <option value="female">Female Voice</option>
                        <option value="neutral">Neutral/Auto</option>
                    </select>
                    <div class="help-text">This voice will be used for your medication reminders and guidance</div>
                    <div class="error" id="voiceError"></div>
                </div>

                <div class="form-group">
                    <label for="volumeLevel">Reminder Volume Level</label>
                    <select id="volumeLevel" name="volumeLevel">
                        <option value="normal">Normal</option>
                        <option value="high">High (for hearing difficulties)</option>
                        <option value="low">Low (for quiet reminders)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-submit" style="background: #95a5a6; flex: 1;" onclick="previousStep(3)">Back</button>
                    <button type="submit" class="btn-submit" style="flex: 1;" id="submitBtn">Complete Setup</button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Saving your information...</p>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
